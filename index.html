<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: arial, sans-serif; background: #fff; color: #202124; min-height: 100vh; display: flex; flex-direction: column; }
        .nav { display: flex; justify-content: flex-end; gap: 16px; padding: 12px 20px; align-items: center; }
        .nav-link { font-size: 13px; color: #202124; text-decoration: none; cursor: pointer; }
        .nav-link:hover { text-decoration: underline; }
        .sign-in { background: #1a73e8; color: white; border: none; border-radius: 4px; padding: 9px 20px; font-size: 14px; cursor: pointer; font-weight: 500; }
        .sign-in:hover { background: #1765cc; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 80px 20px 20px; flex: 1; }
        .logo { display: flex; gap: 2px; font-size: 68px; font-weight: 700; margin-bottom: 28px; line-height: 1; }
        .b { color: #4285F4; }
        .r { color: #EA4335; }
        .y { color: #FBBC05; }
        .g { color: #34A853; }
        .search-box { display: flex; align-items: center; width: 580px; max-width: 100%; border: 1px solid #dfe1e5; border-radius: 24px; padding: 10px 16px; gap: 10px; background: #fff; transition: box-shadow 0.2s; }
        .search-box:focus-within { box-shadow: 0 1px 6px rgba(32,33,36,.28); border-color: transparent; }
        .search-box input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; color: #202124; }
        .search-box input::placeholder { color: #9aa0a6; }
        .btn { background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; padding: 9px 16px; font-size: 14px; color: #3c4043; cursor: pointer; }
        .btn:hover { border-color: #dadce0; box-shadow: 0 1px 1px rgba(0,0,0,.1); }
        .buttons { display: flex; gap: 12px; margin-top: 24px; }
        .language { margin-top: 16px; font-size: 13px; color: #202124; }
        .language a { color: #1a73e8; cursor: pointer; text-decoration: none; margin: 0 4px; }
        .language a:hover { text-decoration: underline; }
        .apps { display: flex; gap: 20px; margin-top: 36px; flex-wrap: wrap; justify-content: center; }
        .app { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; text-decoration: none; }
        .app-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .app-label { font-size: 12px; color: #5f6368; }
        .footer { padding: 16px 20px; border-top: 1px solid #e8eaed; width: 100%; display: flex; justify-content: space-between; font-size: 13px; color: #70757a; flex-wrap: wrap; gap: 8px; }
        .footer a { color: #70757a; text-decoration: none; cursor: pointer; margin-right: 16px; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="nav">
        <a class="nav-link">Gmail</a>
        <a class="nav-link">Images</a>
        <span style="font-size:22px; color:#5f6368; cursor:pointer;">⠿</span>
        <button class="sign-in">Sign in</button>
    </div>

    <div class="container">

        <div class="logo">
            <span class="b">G</span>
            <span class="r">o</span>
            <span class="y">o</span>
            <span class="g">g</span>
            <span class="b">l</span>
            <span class="r">e</span>
        </div>

        <div class="search-box">
            <span style="color:#9aa0a6; font-size:20px;">🔍</span>
            <input type="text" id="searchInput" placeholder="" autofocus />
            <span style="color:#4285F4; font-size:20px; cursor:pointer;">🎤</span>
            <span style="color:#4285F4; font-size:20px; cursor:pointer;">📷</span>
        </div>

        <div class="buttons">
            <button class="btn" onclick="doSearch()">Google Search</button>
            <button class="btn" onclick="feelingLucky()">I'm Feeling Lucky</button>
        </div>

        <div class="language">
            Google offered in:
            <a>हिन्दी</a>
            <a>বাংলা</a>
            <a>తెలుగు</a>
            <a>தமிழ்</a>
        </div>

        <div class="apps">
            <a class="app">
                <div class="app-icon" style="background:#e8f0fe; font-size:24px;">📧</div>
                <span class="app-label">Gmail</span>
            </a>
            <a class="app">
                <div class="app-icon" style="background:#fce8e6; font-size:24px;">📍</div>
                <span class="app-label">Maps</span>
            </a>
            <a class="app">
                <div class="app-icon" style="background:#e6f4ea; font-size:24px;">▶️</div>
                <span class="app-label">YouTube</span>
            </a>
            <a class="app">
                <div class="app-icon" style="background:#fef7e0; font-size:24px;">📅</div>
                <span class="app-label">Calendar</span>
            </a>
            <a class="app">
                <div class="app-icon" style="background:#e8f0fe; font-size:24px;">💻</div>
                <span class="app-label">Meet</span>
            </a>
            <a class="app">
                <div class="app-icon" style="background:#e6f4ea; font-size:24px;">📄</div>
                <span class="app-label">Docs</span>
            </a>
        </div>

    </div>

    <div class="footer">
        <div>
            <a>Advertising</a>
            <a>Business</a>
            <a>How Search works</a>
        </div>
        <div>
            <a>Privacy</a>
            <a>Terms</a>
            <a>Settings</a>
        </div>
    </div>

    <script>
        function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (q) {
                window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank');
            } else {
                window.open('https://www.google.com', '_blank');
            }
        }

        function feelingLucky() {
            const q = document.getElementById('searchInput').value.trim();
            if (q) {
                window.open('https://www.google.com/search?q=' + encodeURIComponent(q) + '&btnI=1', '_blank');
            }
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doSearch();
        });
    </script>

</body>
</html>
